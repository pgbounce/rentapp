name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/toprent
      DATABASE_URL: postgresql://toprent_app:toprent_app@127.0.0.1:5432/toprent
      REDIS_URL: redis://127.0.0.1:6379

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: toprent
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d toprent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:provision
      - run: pnpm db:migrate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
